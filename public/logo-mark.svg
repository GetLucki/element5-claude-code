<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <!-- Subtle line glow for depth -->
    <filter id="lg" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Stronger glow for the centre sparkle -->
    <filter id="sg" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    Pentagon vertices — POINT UP, flat bottom (R=125, cx=150, cy=150):
    V0 top:          150.0,  25.0
    V1 upper-right:  268.9, 111.4
    V2 lower-right:  223.5, 251.1
    V3 lower-left:    76.5, 251.1
    V4 upper-left:    31.1, 111.4
    Centroid: (150, 150)
  -->

  <!-- Pentagram: V0→V2→V4→V1→V3 (every-other vertex, creates the star) -->
  <polygon
    points="150,25 223.5,251.1 31.1,111.4 268.9,111.4 76.5,251.1"
    stroke="white" stroke-width="10" stroke-opacity="0.88"
    stroke-linejoin="miter" stroke-miterlimit="10"
    filter="url(#lg)"
  />

  <!-- Pentagon outline -->
  <polygon
    points="150,25 268.9,111.4 223.5,251.1 76.5,251.1 31.1,111.4"
    stroke="white" stroke-width="10" stroke-opacity="0.88"
    stroke-linejoin="miter" stroke-miterlimit="10"
    filter="url(#lg)"
  />

  <!-- Faint dark mask behind sparkle so it reads above the crossing lines -->
  <circle cx="150" cy="150" r="16" fill="black" fill-opacity="0.25"/>

  <!-- 4-pointed sparkle (tips: ±28 vertical, ±25 horizontal; inner waist ±3 at 45°) -->
  <path
    d="M 150,122 L 153,147 L 175,150 L 153,153 L 150,178 L 147,153 L 125,150 L 147,147 Z"
    fill="white"
    filter="url(#sg)"
  />

  <!-- Bright centre dot -->
  <circle cx="150" cy="150" r="4" fill="white"/>
</svg>
