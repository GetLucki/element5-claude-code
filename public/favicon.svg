<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark rounded background (matches app midnight colour) -->
  <rect width="100" height="100" rx="22" fill="#1B2438"/>

  <defs>
    <!-- Solid gold — better than gradient at small favicon sizes -->
    <filter id="fg" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="fc" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    Pentagon vertices scaled to R=42, cx=50, cy=50, point-down:
    V0 bottom:       50.0, 92.0
    V1 right:        89.9, 63.0
    V2 upper-right:  74.7, 16.0
    V3 upper-left:   25.3, 16.0
    V4 left:         10.1, 63.0
  -->

  <!-- Pentagram -->
  <polygon
    points="50,92 74.7,16 10.1,63 89.9,63 25.3,16"
    stroke="#D4A030" stroke-width="4.5" stroke-linejoin="miter" stroke-miterlimit="10" fill="none"
    filter="url(#fg)"
  />
  <!-- Pentagon -->
  <polygon
    points="50,92 89.9,63 74.7,16 25.3,16 10.1,63"
    stroke="#D4A030" stroke-width="4.5" stroke-linejoin="miter" stroke-miterlimit="10" fill="none"
    filter="url(#fg)"
  />

  <!-- Sparkle glow halo -->
  <circle cx="50" cy="50" r="8" fill="#00D8F4" opacity="0.20"/>

  <!-- 4-pointed sparkle -->
  <path
    d="M 50,41 L 51.5,48.5 L 59,50 L 51.5,51.5 L 50,59 L 48.5,51.5 L 41,50 L 48.5,48.5 Z"
    fill="#46E6F8"
    filter="url(#fc)"
  />

  <circle cx="50" cy="50" r="1.2" fill="white" opacity="0.95"/>
</svg>
