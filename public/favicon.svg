<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="22" fill="#1B2438"/>

  <defs>
    <filter id="lg" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sg" x="-180%" y="-180%" width="460%" height="460%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    Pentagon POINT UP (R=40, cx=50, cy=50):
    V0 top:          50.0, 10.0
    V1 upper-right:  88.0, 37.6
    V2 lower-right:  73.5, 82.4
    V3 lower-left:   26.5, 82.4
    V4 upper-left:   12.0, 37.6
  -->

  <!-- Pentagram -->
  <polygon
    points="50,10 73.5,82.4 12,37.6 88,37.6 26.5,82.4"
    stroke="white" stroke-width="4.5" stroke-opacity="0.9"
    stroke-linejoin="miter" stroke-miterlimit="10" fill="none"
    filter="url(#lg)"
  />
  <!-- Pentagon -->
  <polygon
    points="50,10 88,37.6 73.5,82.4 26.5,82.4 12,37.6"
    stroke="white" stroke-width="4.5" stroke-opacity="0.9"
    stroke-linejoin="miter" stroke-miterlimit="10" fill="none"
    filter="url(#lg)"
  />

  <!-- Dark mask behind sparkle -->
  <circle cx="50" cy="50" r="6" fill="black" fill-opacity="0.3"/>

  <!-- 4-pointed sparkle -->
  <path
    d="M 50,41 L 51.2,48.8 L 58,50 L 51.2,51.2 L 50,59 L 48.8,51.2 L 42,50 L 48.8,48.8 Z"
    fill="white"
    filter="url(#sg)"
  />
  <circle cx="50" cy="50" r="1.5" fill="white"/>
</svg>
